<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/slideshow.css">
    <title>slide show</title>
</head>
<body>
    <div class="slideshow-container">
        <div class="mySlides fade">
            <div class="number-text">1 / 3</div>
            <img src="../img/paysages/pyramide.png" alt="pyramide">
            <div class="text">caption text</div>
        </div>
        <div class="mySlides fade">
            <div class="number-text">2 / 3</div>
            <img src="../img/paysages/tourEiffel1.png" alt="tour eiffel">
            <div class="text">caption text</div>
        </div>
        <div class="mySlides fade">
            <div class="number-text">3 / 3</div>
            <img src="../img/paysages/tourEiffel2.png" alt="tour eiffel">
            <div class="text">caption text</div>
        </div>
        <!-- add next and previous buttons-->
        <a class="prev" onclick="plusSlides(-1)">&#1094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <!--  the dots circles... -->
    <div style="text-align: center;">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>
    <script src="../script/slideshow.js"></script>
</body>
</html>
