<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product list with cart</title>
</head>
<body>
  <main class="container">
    <section class="products">
      <h1 class="products__title">Desserts</h1>
      <div id="products-grid" class="products__grid">
        <!-- Products will be loaded here dynamically -->
      </div>
    </section>

    <aside class="cart" id="cart">
      <h2 class="cart__title">Your Cart (<span id="cart-count">0</span>)</h2>
      
      <div id="cart-empty" class="cart__empty">
        <img src="./assets/images/illustration-empty-cart.svg" alt="" class="cart__empty-img">
        <p>Your added items will appear here</p>
      </div>

      <div id="cart-content" class="cart__content hidden">
        <div id="cart-items" class="cart__items">
          <!-- Cart items will be loaded here -->
        </div>

        <div class="cart__total">
          <span>Order Total</span>
          <span id="order-total" class="cart__total-price">$0.00</span>
        </div>

        <div class="cart__delivery-info">
          <img src="./assets/images/icon-carbon-neutral.svg" alt="">
          <p>This is a <strong>carbon-neutral</strong> delivery</p>
        </div>

        <button id="confirm-order" class="btn btn--primary btn--full">Confirm Order</button>
      </div>
    </aside>
  </main>

  <!-- Order Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <img src="./assets/images/icon-order-confirmed.svg" alt="" class="modal__icon">
      <h2 class="modal__title">Order Confirmed</h2>
      <p class="modal__text">We hope you enjoy your food!</p>

      <div class="order-summary">
        <div id="confirmed-items" class="order-summary__items">
          <!-- Confirmed items will be loaded here -->
        </div>
        <div class="order-summary__total">
          <span>Order Total</span>
          <span id="modal-total" class="order-summary__total-price">$0.00</span>
        </div>
      </div>

      <button id="new-order" class="btn btn--primary btn--full">Start New Order</button>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Junie</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
