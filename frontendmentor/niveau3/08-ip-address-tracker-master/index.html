<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | IP Address Tracker</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>IP Address Tracker</h1>
      <form id="search-form" class="search-form" novalidate>
        <div class="input-group">
          <input type="text" id="search-input" placeholder="Search for any IP address or domain" aria-label="Search for any IP address or domain">
          <button type="submit" aria-label="Search">
            <img src="./images/icon-arrow.svg" alt="">
          </button>
        </div>
        <p class="error-msg" id="error-msg"></p>
      </form>
    </header>

    <section class="results-panel" id="results-panel">
      <div class="result-item">
        <span class="result-label">IP Address</span>
        <p class="result-value" id="ip-address">--</p>
      </div>
      <div class="result-item">
        <span class="result-label">Location</span>
        <p class="result-value" id="location">--</p>
      </div>
      <div class="result-item">
        <span class="result-label">Timezone</span>
        <p class="result-value" id="timezone">UTC --</p>
      </div>
      <div class="result-item">
        <span class="result-label">ISP</span>
        <p class="result-value" id="isp">--</p>
      </div>
    </section>

    <div id="map"></div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
