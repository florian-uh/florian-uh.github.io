<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>
  <main class="container">
    <div class="content-wrapper">
      <header class="logo-container">
        <img src="images/logo.svg" alt="Base Apparel Logo">
      </header>

      <div class="hero-mobile">
        <img src="images/hero-mobile.jpg" alt="">
      </div>

      <section class="text-content">
        <h1 class="title"><span class="accent">We're</span> coming soon</h1>
        <p class="description">
          Hello fellow shoppers! We're currently building our new fashion store. 
          Add your email below to stay up-to-date with announcements and our launch deals.
        </p>

        <form class="email-form" id="email-form" novalidate>
          <div class="input-container">
            <input type="email" id="email" placeholder="Email Address" aria-label="Email Address">
            <img src="images/icon-error.svg" alt="" class="error-icon" id="error-icon">
            <button type="submit" class="submit-btn" aria-label="Submit">
              <img src="images/icon-arrow.svg" alt="">
            </button>
          </div>
          <p class="error-message" id="error-message">Please provide a valid email</p>
        </form>
      </section>
    </div>

    <div class="hero-desktop"></div>
  </main>
  
  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/17-base-apparel-coming-soon-master">Florian-uh</a>.
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
