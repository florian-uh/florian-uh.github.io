<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400&family=Bellefair&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Space tourism website</title>
</head>
<body class="crew">
  <header class="primary-header flex">
    <div>
      <img src="./assets/shared/logo.svg" alt="space tourism logo" class="logo">
    </div>
    <button class="mobile-nav-toggle" aria-controls="primary-navigation"><span class="sr-only" aria-expanded="false">Menu</span></button>
    <nav>
        <ul id="primary-navigation" data-visible="false" class="primary-navigation underline-indicators flex">
            <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="index.html"><span aria-hidden="true">00</span>Home</a></li>
            <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="destination-moon.html"><span aria-hidden="true">01</span>Destination</a></li>
            <li class="active"><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="crew-commander.html"><span aria-hidden="true">02</span>Crew</a></li>
            <li><a class="ff-sans-cond uppercase text-white letter-spacing-2" href="technology-vehicle.html"><span aria-hidden="true">03</span>Technology</a></li>
        </ul>
    </nav>
  </header>

  <main id="main" class="grid-container grid-container--crew">
    <h1 class="numbered-title"><span aria-hidden="true">02</span> Meet your crew</h1>

    <div class="dot-indicators flex" role="tablist" aria-label="crew member list">
        <button aria-selected="true" role="tab" aria-controls="commander-panel" tabindex="0" data-type="crew" data-value="Douglas Hurley"><span class="sr-only">The commander</span></button>
        <button aria-selected="false" role="tab" aria-controls="specialist-panel" tabindex="-1" data-type="crew" data-value="Mark Shuttleworth"><span class="sr-only">The mission specialist</span></button>
        <button aria-selected="false" role="tab" aria-controls="pilot-panel" tabindex="-1" data-type="crew" data-value="Victor Glover"><span class="sr-only">The pilot</span></button>
        <button aria-selected="false" role="tab" aria-controls="engineer-panel" tabindex="-1" data-type="crew" data-value="Anousheh Ansari"><span class="sr-only">The flight engineer</span></button>
    </div>

    <article class="crew-info" id="commander-panel" role="tabpanel" tabindex="0">
        <header class="flex" style="flex-direction: column; gap: .5rem;">
          <h2 id="crew-role" class="fs-600 ff-serif uppercase">Commander</h2>
          <p id="crew-name" class="fs-700 ff-serif uppercase">Douglas Hurley</p>
        </header>
        <p id="crew-bio">Douglas Gerald Hurley is an American engineer, former Marine Corps pilot 
        and former NASA astronaut. He launched into space for the third time as 
        commander of Crew Dragon Demo-2.</p>
    </article>

    <picture id="crew-image">
      <source srcset="assets/crew/image-douglas-hurley.webp" type="image/webp">
      <img src="assets/crew/image-douglas-hurley.png" alt="Douglas Hurley">
    </picture>
  </main>

  <script src="navigation.js"></script>
  <script src="tabs.js"></script>
</body>
</html>
