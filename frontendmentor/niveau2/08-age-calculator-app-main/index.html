<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Age calculator app</title>

</head>
<body>

  <main class="calculator-card">
    <form id="age-form" class="input-group">
      <div class="input-field">
        <label for="day">Day</label>
        <input type="number" id="day" placeholder="DD" min="1" max="31">
        <span class="error-msg"></span>
      </div>
      <div class="input-field">
        <label for="month">Month</label>
        <input type="number" id="month" placeholder="MM" min="1" max="12">
        <span class="error-msg"></span>
      </div>
      <div class="input-field">
        <label for="year">Year</label>
        <input type="number" id="year" placeholder="YYYY" min="1900">
        <span class="error-msg"></span>
      </div>
      
      <div class="divider">
        <hr>
        <button type="submit" aria-label="Calculate Age">
          <img src="./assets/images/icon-arrow.svg" alt="">
        </button>
      </div>
    </form>

    <div class="results">
      <p><span id="res-years">--</span> years</p>
      <p><span id="res-months">--</span> months</p>
      <p><span id="res-days">--</span> days</p>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Florian-uh</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
