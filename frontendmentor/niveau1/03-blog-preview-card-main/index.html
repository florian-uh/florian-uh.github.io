<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <header class="card-header">
      <img src="assets/images/illustration-article.svg" alt="Illustration Article" class="hero-image">
    </header>

    <div class="card-body">
      <span class="category">Learning</span>
      <p class="publish-date">Published 21 Dec 2023</p>
      <h1 class="title"><a href="#">HTML & CSS foundations</a></h1>
      <p class="description">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
    </div>

    <footer class="card-footer">
      <img src="assets/images/image-avatar.webp" alt="Avatar Greg Hooper" class="avatar">
      <span class="author-name">Greg Hooper</span>
    </footer>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/03-blog-preview-card-main">Florian-uh</a>.
  </footer>
</body>
</html>
