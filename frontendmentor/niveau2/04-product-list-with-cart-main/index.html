<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Product List with Cart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Desserts</h1>
  </header>
  <main>
    <!-- Section pour afficher les cartes des produits -->
    <section id="product-list" class="product-list">
      <!-- Les cartes seront générées dynamiquement via JavaScript -->
    </section>

    <!-- Section pour afficher le panier -->
    <aside id="cart" class="cart">
      <h2>Your Cart (<span id="cart-count">0</span>)</h2>
      <div id="cart-items">
        <p>Your added items will appear here</p>
      </div>
      <div id="cart-total" class="cart-total">
        <p>Order Total: <span id="order-total">$0.00</span></p>
        <button id="confirm-order" class="confirm-order">Confirm Order</button>
      </div>
    </aside>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
  <script src="script.js"></script>
</body>
</html>
