<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <main class="nft-card">
    <div class="image-container">
      <img src="images/image-equilibrium.jpg" alt="Equilibrium NFT" class="nft-image">
      <div class="overlay">
        <img src="images/icon-view.svg" alt="" aria-hidden="true">
      </div>
    </div>
    
    <article class="nft-content">
      <h1 class="nft-title"><a href="#">Equilibrium #3429</a></h1>
      <p class="nft-description">Our Equilibrium collection promotes balance and calm.</p>
      
      <div class="nft-info">
        <div class="price">
          <img src="images/icon-ethereum.svg" alt="" aria-hidden="true">
          <span>0.041 ETH</span>
        </div>
        <div class="time-left">
          <img src="images/icon-clock.svg" alt="" aria-hidden="true">
          <span>3 days left</span>
        </div>
      </div>
      
      <hr class="divider">
      
      <footer class="nft-footer">
        <img src="images/image-avatar.png" alt="Avatar of Jules Wyvern" class="avatar">
        <p>Creation of <a href="#" class="author-name">Jules Wyvern</a></p>
      </footer>
    </article>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/09-nft-preview-card-component-main">Your Name Here</a>.
  </footer>
</body>
</html>
