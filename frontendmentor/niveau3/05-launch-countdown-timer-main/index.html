<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Launch countdown timer</title>
</head>
<body>

  <main>
    <h1>We're launching soon</h1>

    <div class="countdown">
      <div class="time-block">
        <div class="card" id="days">
          <div class="top">08</div>
          <div class="bottom">08</div>
        </div>
        <p>Days</p>
      </div>
      <div class="time-block">
        <div class="card" id="hours">
          <div class="top">23</div>
          <div class="bottom">23</div>
        </div>
        <p>Hours</p>
      </div>
      <div class="time-block">
        <div class="card" id="minutes">
          <div class="top">55</div>
          <div class="bottom">55</div>
        </div>
        <p>Minutes</p>
      </div>
      <div class="time-block">
        <div class="card" id="seconds">
          <div class="top">41</div>
          <div class="bottom">41</div>
        </div>
        <p>Seconds</p>
      </div>
    </div>
  </main>

  <nav class="social-links">
    <a href="#" aria-label="Facebook"><img src="./images/icon-facebook.svg" alt=""></a>
    <a href="#" aria-label="Pinterest"><img src="./images/icon-pinterest.svg" alt=""></a>
    <a href="#" aria-label="Instagram"><img src="./images/icon-instagram.svg" alt=""></a>
  </nav>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
