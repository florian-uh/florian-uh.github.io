<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
  <main class="container">
    <section class="dashboard">
      <!-- Profile Card -->
      <div class="card card--profile">
        <div class="profile-header">
          <img src="./images/image-jeremy.png" alt="Jeremy Robson" class="profile-img">
          <div class="profile-info">
            <p>Report for</p>
            <h1>Jeremy Robson</h1>
          </div>
        </div>
        <div class="profile-filters">
          <button class="filter-btn" data-timeframe="daily">Daily</button>
          <button class="filter-btn active" data-timeframe="weekly">Weekly</button>
          <button class="filter-btn" data-timeframe="monthly">Monthly</button>
        </div>
      </div>

      <!-- Category Cards will be loaded here dynamically -->
      <div id="cards-container" class="cards-container">
        <!-- Template for each card -->
      </div>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Junie</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
