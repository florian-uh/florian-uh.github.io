<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>
  <main class="order-card">
    <header class="card-header">
      <img src="images/illustration-hero.svg" alt="" aria-hidden="true" class="hero-img">
    </header>
    
    <section class="card-content">
      <h1 class="card-title">Order Summary</h1>
      <p class="card-description">
        You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!
      </p>

      <div class="plan-container">
        <div class="plan-details">
          <img src="images/icon-music.svg" alt="" aria-hidden="true">
          <div>
            <h2 class="plan-name">Annual Plan</h2>
            <p class="plan-price">$59.99/year</p>
          </div>
        </div>
        <a href="#" class="change-link">Change</a>
      </div>

      <button class="payment-btn">Proceed to Payment</button>
      <button class="cancel-btn">Cancel Order</button>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/10-order-summary-component-main">Your Name Here</a>.
  </footer>
</body>
</html>
