<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Expenses chart component</title>
</head>
<body>
  <main class="container">
    <header class="balance-card">
      <div class="balance-info">
        <p class="balance-label">My balance</p>
        <p class="balance-amount">$921.48</p>
      </div>
      <img src="./images/logo.svg" alt="" class="logo">
    </header>

    <section class="chart-card">
      <h1 class="chart-title">Spending - Last 7 days</h1>
      
      <div id="chart-container" class="chart-container">
        <!-- Bars will be loaded here dynamically -->
      </div>

      <hr class="divider">

      <div class="summary">
        <div class="summary__total">
          <p class="summary__label">Total this month</p>
          <p class="summary__amount">$478.33</p>
        </div>
        <div class="summary__diff">
          <p class="summary__percentage">+2.4%</p>
          <p class="summary__label">from last month</p>
        </div>
      </div>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Florian-uh</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
