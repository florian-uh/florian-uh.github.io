<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Ping coming soon page</title>
</head>
<body>
  <main class="container">
    <header class="header">
      <img src="images/logo.svg" alt="Ping logo" class="logo">
    </header>

    <section class="hero">
      <h1 class="title">We are launching <span>soon!</span></h1>
      <p class="subtitle">Subscribe and get notified</p>

      <form id="notify-form" class="form" novalidate>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="Your email address..." aria-label="Email">
          <p class="error-msg" id="error-msg">Please provide a valid email address</p>
        </div>
        <button type="submit" class="btn-primary">Notify Me</button>
      </form>
    </section>

    <section class="illustration">
      <img src="images/illustration-dashboard.png" alt="Dashboard illustration">
    </section>

    <footer class="site-footer">
      <p class="copyright">&copy; Copyright Ping. All rights reserved.</p>

      <p class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/20-ping-coming-soon-page-master">Florian-uh</a>.
      </p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
