<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <main class="results-container">
    <section class="result-card">
      <h2 class="card-title">Your Result</h2>
      <div class="result-circle">
        <span class="score">76</span>
        <span class="of-total">of 100</span>
      </div>
      <div class="result-text">
        <p class="result-status">Great</p>
        <p class="result-description">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </section>

    <section class="summary-section">
      <h2 class="summary-title">Summary</h2>
      <div class="summary-items">
        <div class="summary-item reaction">
          <div class="item-title">
            <img src="./assets/images/icon-reaction.svg" alt="" aria-hidden="true">
            <span>Reaction</span>
          </div>
          <p class="item-score"><span class="actual-score">80</span> / 100</p>
        </div>
        <div class="summary-item memory">
          <div class="item-title">
            <img src="./assets/images/icon-memory.svg" alt="" aria-hidden="true">
            <span>Memory</span>
          </div>
          <p class="item-score"><span class="actual-score">92</span> / 100</p>
        </div>
        <div class="summary-item verbal">
          <div class="item-title">
            <img src="./assets/images/icon-verbal.svg" alt="" aria-hidden="true">
            <span>Verbal</span>
          </div>
          <p class="item-score"><span class="actual-score">61</span> / 100</p>
        </div>
        <div class="summary-item visual">
          <div class="item-title">
            <img src="./assets/images/icon-visual.svg" alt="" aria-hidden="true">
            <span>Visual</span>
          </div>
          <p class="item-score"><span class="actual-score">72</span> / 100</p>
        </div>
      </div>
      <button class="btn-continue">Continue</button>
    </section>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/florian-uh/florian-uh.github.io/tree/main/frontendmentor/niveau1/05-results-summary-component-main">Florian-uh</a>.
  </footer>
</body>
</html>
