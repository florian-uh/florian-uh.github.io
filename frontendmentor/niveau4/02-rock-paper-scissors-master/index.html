<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Rock, Paper, Scissors</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <ul>
      <li class="rock">ROCK</li>
      <li class="paper">PAPER</li>
      <li class="scissors">SCISSORS</li>
    </ul>
    <div class="score">
      <p>Score</p>
      <div class="display"></div>
    </div>
  </header>
  <main>
    <div class="game">
      <div class="scissors" id="scissors">
        <img src="images/icon-scissors.svg" alt="icon-scissors">
      </div>
      <div class="paper" id="paper">
        <img src="images/icon-paper.svg" alt="icon-paper">
      </div>
      <div class="rock" id="rock">
        <img src="images/icon-rock.svg" alt="icon-rock">
      </div>
      <div class="lizard" id="lizard">
        <img src="images/icon-lizard.svg" alt="icon-lizard">
      </div>
      <div class="spock" id="spock">
        <img src="images/icon-spock.svg" alt="icon-spock">
      </div>
    </div>
    <button class="rules">Voir les règles</button>
  </main>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
  <script src="script.js"></script>
</body>
</html>
