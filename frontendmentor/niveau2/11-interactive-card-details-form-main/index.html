<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Interactive card details form</title>
</head>
<body>
  <main class="container">
    <section class="card-display">
      <div class="cards-wrapper">
        <div class="card card--front">
          <img src="./images/bg-card-front.png" alt="" class="card__bg">
          <div class="card__content">
            <img src="./images/card-logo.svg" alt="" class="card__logo">
            <p id="display-number" class="card__number">0000 0000 0000 0000</p>
            <div class="card__info">
              <span id="display-name" class="card__name">Jane Appleseed</span>
              <span id="display-date" class="card__date">00/00</span>
            </div>
          </div>
        </div>

        <div class="card card--back">
          <img src="./images/bg-card-back.png" alt="" class="card__bg">
          <span id="display-cvc" class="card__cvc">000</span>
        </div>
      </div>
    </section>

    <section class="form-section">
      <form id="card-form" class="form" novalidate>
        <div class="form__group">
          <label for="cardholder-name" class="form__label">Cardholder Name</label>
          <input type="text" id="cardholder-name" class="form__input" placeholder="e.g. Jane Appleseed" required>
          <p class="error-msg hidden">Can't be blank</p>
        </div>

        <div class="form__group">
          <label for="card-number" class="form__label">Card Number</label>
          <input type="text" id="card-number" class="form__input" placeholder="e.g. 1234 5678 9123 0000" maxlength="19" required>
          <p class="error-msg hidden">Wrong format, numbers only</p>
        </div>

        <div class="form__row">
          <div class="form__group">
            <label class="form__label">Exp. Date (MM/YY)</label>
            <div class="form__inputs">
              <input type="text" id="month" class="form__input" placeholder="MM" maxlength="2" required>
              <input type="text" id="year" class="form__input" placeholder="YY" maxlength="2" required>
            </div>
            <p id="date-error" class="error-msg hidden">Can't be blank</p>
          </div>

          <div class="form__group">
            <label for="cvc" class="form__label">CVC</label>
            <input type="text" id="cvc" class="form__input" placeholder="e.g. 123" maxlength="3" required>
            <p class="error-msg hidden">Can't be blank</p>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--full">Confirm</button>
      </form>

      <!-- Completed state start -->
      <div id="completed-state" class="completed hidden">
        <img src="./images/icon-complete.svg" alt="" class="completed__icon">
        <h1 class="completed__title">Thank you!</h1>
        <p class="completed__text">We've added your card details</p>
        <button id="continue-btn" class="btn btn--primary btn--full">Continue</button>
      </div>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Florian-uh</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
