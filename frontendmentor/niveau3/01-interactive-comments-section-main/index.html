<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Interactive comments section</title>
</head>
<body>
  <main class="main-container">
    <div class="comments-container">
      <!-- Dynamically generated comments -->
    </div>

    <!-- Main Add Comment -->
    <div class="input-card">
      <img src="" alt="avatar" class="input-avatar main-input-avatar">
      <textarea class="comment-input add-comment-input" placeholder="Add a comment..."></textarea>
      <button class="btn-send btn-send-main">Send</button>
    </div>
  </main>

  <!-- Modal Delete Confirmation -->
  <div class="modal-overlay">
    <div class="modal-card">
      <h2 class="modal-title">Delete comment</h2>
      <p class="modal-text">Are you sure you want to delete this comment? This will remove the comment and can't be undone.</p>
      <div class="modal-actions">
        <button class="btn-modal btn-cancel">No, cancel</button>
        <button class="btn-modal btn-confirm">Yes, delete</button>
      </div>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Junie</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
