<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <title>Frontend Mentor | Calculator app</title>
</head>
<body data-theme="1">
  <main class="calc-wrapper">
    <header class="calc-header">
      <h1 class="brand" aria-label="Calculator">calc</h1>
      <div class="theme-switcher" aria-label="Sélecteur de thème">
        <div class="labels" aria-hidden="true">
          <span>THEME</span>
          <div class="nums"><label for="theme-1">1</label><label for="theme-2">2</label><label for="theme-3">3</label></div>
        </div>
        <div class="toggle">
          <input type="radio" id="theme-1" name="theme" value="1" checked>
          <input type="radio" id="theme-2" name="theme" value="2">
          <input type="radio" id="theme-3" name="theme" value="3">
          <div class="knob" aria-hidden="true"></div>
        </div>
      </div>
    </header>

    <output id="display" class="display" role="status" aria-live="polite">0</output>

    <section class="keypad" role="group" aria-label="Touches de la calculatrice">
      <button data-key="7" class="key">7</button>
      <button data-key="8" class="key">8</button>
      <button data-key="9" class="key">9</button>
      <button data-action="del" class="key key-func key-del">DEL</button>

      <button data-key="4" class="key">4</button>
      <button data-key="5" class="key">5</button>
      <button data-key="6" class="key">6</button>
      <button data-op="+" class="key key-op">+</button>

      <button data-key="1" class="key">1</button>
      <button data-key="2" class="key">2</button>
      <button data-key="3" class="key">3</button>
      <button data-op="-" class="key key-op">-</button>

      <button data-key="." class="key">.</button>
      <button data-key="0" class="key">0</button>
      <button data-op="/" class="key key-op">/</button>
      <button data-op="*" class="key key-op">x</button>

      <button data-action="reset" class="key key-wide key-reset">RESET</button>
      <button data-action="equals" class="key key-wide key-equals">=</button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
